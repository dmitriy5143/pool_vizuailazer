services:
  pool-ai-visualizer:
    build:
      context: .
    image: pool-ai-visualizer-demo:local
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5177
      DEMO_GENERATION_MODE: ${DEMO_GENERATION_MODE:-auto}
      OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-google/gemini-3.1-flash-image}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Pool AI Visualizer Demo}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-http://localhost:5177}
      OPENROUTER_IMAGE_QUALITY: ${OPENROUTER_IMAGE_QUALITY:-high}
      OPENROUTER_IMAGE_RESOLUTION: ${OPENROUTER_IMAGE_RESOLUTION:-4K}
      OPENROUTER_IMAGE_FORMAT: ${OPENROUTER_IMAGE_FORMAT:-png}
      OPENROUTER_VARIANT_STRATEGY: ${OPENROUTER_VARIANT_STRATEGY:-parallel}
      OPENROUTER_SINGLE_IMAGE_CONCURRENCY: ${OPENROUTER_SINGLE_IMAGE_CONCURRENCY:-1}
      OPENROUTER_IMAGE_STREAMING: ${OPENROUTER_IMAGE_STREAMING:-auto}
      OPENROUTER_TIMEOUT_MS: ${OPENROUTER_TIMEOUT_MS:-180000}
      OPENROUTER_REMOTE_IMAGE_TIMEOUT_MS: ${OPENROUTER_REMOTE_IMAGE_TIMEOUT_MS:-60000}
      OPENROUTER_RETRY_ATTEMPTS: ${OPENROUTER_RETRY_ATTEMPTS:-2}
      OPENROUTER_RETRY_BASE_MS: ${OPENROUTER_RETRY_BASE_MS:-1200}
      OPENROUTER_RETRY_MAX_MS: ${OPENROUTER_RETRY_MAX_MS:-20000}
      OPENROUTER_VALIDATION_MODE: ${OPENROUTER_VALIDATION_MODE:-auto}
      OPENROUTER_VALIDATION_MODEL: ${OPENROUTER_VALIDATION_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_VALIDATION_TIMEOUT_MS: ${OPENROUTER_VALIDATION_TIMEOUT_MS:-90000}
      OPENROUTER_PLACEMENT_MODE: ${OPENROUTER_PLACEMENT_MODE:-auto}
      OPENROUTER_PLACEMENT_MODEL: ${OPENROUTER_PLACEMENT_MODEL:-google/gemini-2.5-flash}
      OPENROUTER_PLACEMENT_TIMEOUT_MS: ${OPENROUTER_PLACEMENT_TIMEOUT_MS:-60000}
      TASK_WORKER_CONCURRENCY: ${TASK_WORKER_CONCURRENCY:-2}
      TASK_RUN_TIMEOUT_MS: ${TASK_RUN_TIMEOUT_MS:-360000}
      TASK_RETRY_ATTEMPTS: ${TASK_RETRY_ATTEMPTS:-2}
      TASK_RETRY_BASE_MS: ${TASK_RETRY_BASE_MS:-1800}
      TASK_RETRY_MAX_MS: ${TASK_RETRY_MAX_MS:-45000}
      REQUEST_HISTORY_LIMIT: ${REQUEST_HISTORY_LIMIT:-100}
      MAX_VARIANT_COUNT: ${MAX_VARIANT_COUNT:-20}
      MAX_UPLOAD_IMAGE_PIXELS: ${MAX_UPLOAD_IMAGE_PIXELS:-25000000}
    ports:
      - "${APP_PORT:-5177}:5177"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5177/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
