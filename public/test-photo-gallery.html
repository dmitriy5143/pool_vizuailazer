<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pool AI Test Photo Set</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #eef3f4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        padding: 20px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        max-width: 820px;
        margin: 8px 0 0;
        color: #64748b;
        line-height: 1.45;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 14px;
        padding: 0 20px 24px;
      }

      article {
        overflow: hidden;
        border: 1px solid #cbd7e0;
        border-radius: 8px;
        background: #ffffff;
      }

      .stage {
        position: relative;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        background: #dbe6ea;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .zone {
        position: absolute;
        border: 3px solid #ffffff;
        background: rgb(14 165 233 / 24%);
        box-shadow: inset 0 0 0 2px rgb(14 165 233 / 92%);
      }

      .meta {
        padding: 10px 12px 12px;
      }

      strong,
      span {
        display: block;
      }

      strong {
        color: #172033;
        font-size: 14px;
      }

      span {
        margin-top: 4px;
        color: #64748b;
        font-size: 12px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Pool AI Test Photo Set</h1>
      <p>Контрольная галерея тестовых фото и зон размещения бассейна. Синие прямоугольники соответствуют зонам из <code>/test-cases.json</code>.</p>
    </header>
    <main id="gallery"></main>
    <script>
      async function render() {
        const cases = await fetch("/test-cases.json").then((response) => response.json());
        document.getElementById("gallery").innerHTML = cases
          .map(
            (item) => `
              <article>
                <div class="stage">
                  <img src="${item.photoUrl}" alt="${item.caseId} ${item.caseName}" />
                  <div
                    class="zone"
                    style="
                      left: ${item.zone.xPct * 100}%;
                      top: ${item.zone.yPct * 100}%;
                      width: ${item.zone.widthPct * 100}%;
                      height: ${item.zone.heightPct * 100}%;
                    "
                  ></div>
                </div>
                <div class="meta">
                  <strong>${item.caseId} ${item.caseName}</strong>
                  <span>${item.mainRisk}</span>
                </div>
              </article>
            `
          )
          .join("");
      }

      render();
    </script>
  </body>
</html>
